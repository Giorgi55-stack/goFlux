<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Meta Ads Automation{% endblock %}</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">
  <header class="bg-white border-b border-gray-200">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="font-semibold text-lg">Meta Ads Automation</a>
      <nav class="flex gap-5 text-sm">
        <a href="/clients" class="hover:text-blue-600">Clientes</a>
        <a href="/campaigns/new" class="hover:text-blue-600">Nova campanha</a>
        <a href="/rules" class="hover:text-blue-600">Regras</a>
        <a href="/history" class="hover:text-blue-600">Histórico</a>
      </nav>
    </div>
  </header>

  <main class="max-w-6xl w-full mx-auto px-4 py-6 flex-1">
    {% block content %}{% endblock %}
  </main>

  <script>
    document.body.addEventListener('htmx:configRequest', function (e) {
      var m = document.cookie.match(/(?:^|; )csrftoken=([^;]+)/);
      if (m) e.detail.headers['x-csrftoken'] = decodeURIComponent(m[1]);
    });
    document.body.addEventListener('htmx:beforeSwap', function (e) {
      var status = e.detail.xhr.status;
      if (status >= 400 && status < 500) {
        e.detail.shouldSwap = true;
        e.detail.isError = false;
      }
    });
  </script>
</body>
</html>
