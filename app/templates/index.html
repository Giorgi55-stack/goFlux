{% extends "base.html" %}
{% block title %}Início — Meta Ads Automation{% endblock %}
{% block content %}
<div class="max-w-2xl">
  <h1 class="text-2xl font-semibold mb-2">Bem-vindo</h1>
  <p class="text-gray-600 mb-6">
    Use o menu acima para gerenciar clientes, criar campanhas, configurar regras
    e ver o histórico.
  </p>
  <div class="grid grid-cols-2 gap-4">
    <a href="/clients" class="block p-4 bg-white border border-gray-200 rounded hover:shadow transition">
      <div class="font-medium">Clientes</div>
      <div class="text-sm text-gray-500">Cadastro e listagem</div>
    </a>
    <a href="/campaigns/new" class="block p-4 bg-white border border-gray-200 rounded hover:shadow transition">
      <div class="font-medium">Nova campanha</div>
      <div class="text-sm text-gray-500">Criar em massa</div>
    </a>
  </div>
</div>
{% endblock %}
